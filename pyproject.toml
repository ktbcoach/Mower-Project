[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "watson-dms-collector"
version = "0.1.0"
description = "Data collection toolkit for the Watson DMS-SGP02 GPS/inertial system on Raspberry Pi"
requires-python = ">=3.9"
dependencies = ["pyserial>=3.5"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
watson-dms = "watson_dms.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
